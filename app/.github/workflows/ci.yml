name: App CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install ripgrep (optional, faster lint:colors)
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -qq -y ripgrep
          fi

      # lint:colors (hex + rgba SSOT) + tsc --noEmit + jest — voir package.json script "verify"
      - name: Verify (theme SSOT + typecheck + unit tests)
        run: npm run verify
