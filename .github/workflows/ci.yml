name: App CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    name: Validate Code Quality
    runs-on: ubuntu-latest

    env:
      # Opt-in to Node 24 runtime for JS-based GitHub Actions to clear the
      # "Node 20 deprecated" annotation (deadline 2026-06-02) without bumping
      # checkout/setup-node majors. The Node engine used by `npm ci` / scripts
      # is still controlled by `setup-node` below (kept on Node 20 for SDK 54).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    defaults:
      run:
        working-directory: ./app

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Install ripgrep (optional, faster lint:colors)
        working-directory: .
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -qq -y ripgrep
          fi

      # lint:colors (hex + rgba SSOT) + tsc --noEmit + jest — voir package.json script "verify"
      - name: Verify (theme SSOT + typecheck + unit tests)
        run: npm run verify
