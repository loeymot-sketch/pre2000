name: EAS Build

on:
  push:
    branches:
      - release/*

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    steps:
      - name: Check for EXPO_TOKEN
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "You must provide an EXPO_TOKEN secret linked to your Expo project's account."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        working-directory: ./app
        run: npm ci

      - name: Install ripgrep (optional, faster lint:colors)
        run: |
          if ! command -v rg >/dev/null 2>&1; then
            sudo apt-get update -qq && sudo apt-get install -qq -y ripgrep
          fi

      - name: Verify (theme SSOT + typecheck + unit tests)
        working-directory: ./app
        run: npm run verify

      - name: Build on EAS
        working-directory: ./app
        run: eas build --platform all --profile preview --non-interactive
