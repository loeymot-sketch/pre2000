name: Weekly Security Audit

on:
  schedule:
    # Tous les lundis à 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install deps
        working-directory: app
        run: npm ci --no-audit --no-fund
      - name: Run npm audit (high+)
        id: audit
        working-directory: app
        run: |
          set +e
          npm audit --audit-level=high --json > audit.json
          AUDIT_EXIT=$?
          echo "exit_code=$AUDIT_EXIT" >> "$GITHUB_OUTPUT"
          # Always succeed the step; we'll surface findings via issue
          exit 0
      - name: Parse findings
        id: parse
        working-directory: app
        run: |
          if [ ! -f audit.json ]; then
            echo "found=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HIGH=$(jq -r '[.vulnerabilities | to_entries[] | select(.value.severity=="high")] | length' audit.json)
          CRIT=$(jq -r '[.vulnerabilities | to_entries[] | select(.value.severity=="critical")] | length' audit.json)
          TOTAL=$((HIGH + CRIT))
          echo "high=$HIGH" >> "$GITHUB_OUTPUT"
          echo "critical=$CRIT" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "found=$TOTAL" >> "$GITHUB_OUTPUT"
      - name: Open issue on findings
        if: steps.parse.outputs.found != '0'
        uses: actions/github-script@v7
        env:
          HIGH_COUNT: ${{ steps.parse.outputs.high }}
          CRIT_COUNT: ${{ steps.parse.outputs.critical }}
        with:
          script: |
            const today = new Date().toISOString().split('T')[0];
            const title = `[security] npm audit findings ${today}: ${process.env.CRIT_COUNT} critical, ${process.env.HIGH_COUNT} high`;
            const body = [
              '## Weekly npm audit findings',
              '',
              `- Critical: ${process.env.CRIT_COUNT}`,
              `- High: ${process.env.HIGH_COUNT}`,
              '',
              'Run `cd app && npm audit --audit-level=high` locally to inspect.',
              '',
              'Triage steps:',
              '1. Confirm if vulnerable code path is reachable in our usage',
              '2. Bump direct dep if available and patches are stable',
              '3. Add temporary npm overrides if no clean fix yet',
              '4. Update SECURITY_NOTES.md with status',
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['security', 'auto-generated'],
            });
